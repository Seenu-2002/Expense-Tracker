name: AndroidBuild

on:
  pull_request :
    branches : [ db_create_dev ]
  push :
    branches : [ db_create_dev ]

jobs:
  checkout:
    runs-on: macOS-latest
    steps:
      - uses: actions/checkout@v3

  test:
    runs-on: macOS-latest
    needs: checkout
    steps:
      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3

      - name: Open Directory
        run: |
            ls -la

      - name: Init gradle wrapper
        run: gradle wrapper

      - name: Run tests
        run: ./gradlew test

  no-dep-job:
    runs-on: macOS-latest
    steps:
      - name: No dependencies job
        run: echo "This job has no dependencies."
