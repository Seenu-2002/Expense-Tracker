name: AndroidBuild

on:
  pull_request :
    branches : [ db_create_dev ]
  push :
    branches : [ db_create_dev ]

jobs:
  checkout:
    runs-on: macOS-latest
    steps:
      - uses: actions/checkout@v3

  test:
    runs-on: macOS-latest
    needs: checkout
    steps:
      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          distribution: 'adopt'
          java-version: '17'

      - name: Run Gradle Wrapper
        run: gradle wrapper

      - name: Grant permissions for Gradle
        run: chmod +x ./gradlew

      - name: Run tests
        run: ./gradlew test

  no-dep-job:
    runs-on: macOS-latest
    steps:
      - name: No dependencies job
        run: echo "This job has no dependencies."