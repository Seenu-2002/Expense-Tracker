name: AndroidBuild

on:
  pull_request :
    branches : [ db_create_dev ]
  push :
    branches : [ db_create_dev ]

jobs:
  test-feature:
    runs-on: macOS-latest

    needs: build

    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: 11

      - name: Use gradle wrapper
        uses: gradle/wrapper@v1

      - name: Grant permissions for Gradle
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew test